name: NSE Bhavcopy Daily Fetch

on:
  schedule:
    - cron: '15 15 * * 1-5'   # 15:15 UTC = रात्री 8:45 IST (सोम-शुक्र)
  workflow_dispatch:           # Manual run साठी बटण

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run downloader
        run: python fetch_bhavcopy.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.csv
          git commit -m "Bhavcopy update $(date +%F)" || echo "No changes"
          git push
